<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <!--css-->
    <link rel="stylesheet" href="./style.css">
    <!--css-->

    <!--Media Query-->
    <link rel="stylesheet" href="./md.css">
    <!--Media Query-->

    <!--favicon-->
    <link rel="shortcut icon" href="./img/faviocn.png" type="image/x-icon">
    <!--favicon-->

    <!--icon-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--icon-->
</head>
<body>
    <!--nav-->
    <div id="nav">
        <div class="logo">
            <img src="./img/logo.png" alt="">
        </div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
        <div class="icon">
            <i class="fa-solid fa-magnifying-glass" style="color: #000000;"></i>
            <i class="fa-solid fa-heart" style="color: #000000;"></i>
            <i class="fa-solid fa-cart-shopping" style="color: #000000;"></i>
        </div>
        <div class="bars">
            <i class="fa-solid fa-bars" style="color: #000000;"></i>
        </div>
    </div>
    <!--nav-->

    <!--hero-->
    <section>
        <div id="main">
            <div class="text">
                <h1>Get the best product at your home</h1>
                <div class="inbox">
                    <i class="fa-solid fa-magnifying-glass" style="color: #666666;"></i>
                    <input type="search" placeholder="Search your favorite products">
                </div>
            </div>
            <div class="main">
                <img src="./img/8.png" alt="">
            </div>
            <div class="main" id="perfume">
                <img src="./img/9.png" alt="">
            </div>
        </div>
</body>
</html>
